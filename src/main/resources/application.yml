spring:
  application:
    name: kotlin-spring
  datasource:
    url: jdbc:postgresql://postgresql:5432/kotlin_spring_development
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
