spring:
  application:
    name: kotlin-spring
  datasource:
    url: jdbc:postgresql://postgresql:5432/kotlin_spring_development
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      "[hibernate.format_sql]": true
  flyway:
    enabled: true

server:
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    csrf:
      enabled: true
    groups-order: DESC
    operations-sorter: method
    disable-swagger-default-url: true
    display-request-duration: true
  api-docs:
    path: /api-docs
  show-actuator: true
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}

app:
  security:
    cors:
      allowed-origins: http://localhost:3000
